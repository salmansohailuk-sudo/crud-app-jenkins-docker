<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CRUD Dashboard</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* THEME VARIABLES */
:root {
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --sub:#64748b;
  --border:#e2e8f0;
}

.dark {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --border:#334155;
}

/* BODY */
body {
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  margin:0;
  transition:0.3s;
}

.container {
  max-width:720px;
  margin:40px auto;
  padding:25px;
  background:var(--card);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SWITCH */
.switch {
  position:relative;
  width:50px;
  height:26px;
}

.switch input {
  display:none;
}

.slider {
  position:absolute;
  cursor:pointer;
  background:#ccc;
  border-radius:50px;
  top:0;left:0;right:0;bottom:0;
  transition:0.3s;
}

.slider:before {
  content:"";
  position:absolute;
  height:20px;width:20px;
  left:3px;top:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider {
  background:#2563eb;
}

input:checked + .slider:before {
  transform:translateX(24px);
}

/* SEARCH */
.search-box {
  display:flex;
  align-items:center;
  background:var(--bg);
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--border);
}

.search-box input {
  border:none;
  background:transparent;
  outline:none;
  margin-left:6px;
  color:var(--text);
}

/* INPUT */
input,button {
  padding:10px;
  margin:6px 5px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

button {
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

/* ITEM */
.item {
  background:var(--bg);
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.controls i {
  margin-left:12px;
  cursor:pointer;
}

/* CONFIRM */
.confirm-box {
  background:#fff7ed;
  padding:8px;
  border-radius:8px;
  display:flex;
  gap:8px;
  align-items:center;
}

/* SUCCESS */
.success-box {
  background:#dcfce7;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  display:none;
}

/* ERROR */
.error-box {
  background:#fee2e2;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  display:none;
  justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>✨ CRUD Dashboard</h2>

<label class="switch">
  <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
  <span class="slider"></span>
</label>

</div>

<div class="search-box">
<i class="fa fa-search"></i>
<input id="search" placeholder="Search..." onkeyup="searchItems()">
</div>

<input id="name" placeholder="Enter item">
<button onclick="saveItem()">Save</button>

<div id="successBox" class="success-box"></div>

<div id="errorBox" class="error-box">
<span id="errorText"></span>
<button onclick="hideError()">OK</button>
</div>

<div id="list"></div>

</div>

<script>
let editId=null;
let searchQuery='';

// THEME LOAD
window.onload = () => {
 let saved = localStorage.getItem("theme");
 if(saved === "dark"){
   document.body.classList.add("dark");
   document.getElementById("themeToggle").checked = true;
 }
 load();
};

// TOGGLE
function toggleTheme(){
 document.body.classList.toggle("dark");
 let isDark = document.body.classList.contains("dark");
 localStorage.setItem("theme", isDark ? "dark" : "light");
}

// SUCCESS
function showSuccess(msg){
 let b=document.getElementById("successBox");
 b.innerText=msg;
 b.style.display="block";
 setTimeout(()=>b.style.display="none",2000);
}

// ERROR
function showError(msg){
 document.getElementById("errorText").innerText=msg;
 document.getElementById("errorBox").style.display="flex";
}
function hideError(){
 document.getElementById("errorBox").style.display="none";
}

// LOAD
async function load(){
 let res=await fetch(`/api/items?search=${searchQuery}`);
 let r=await res.json();

 let list=document.getElementById('list');
 list.innerHTML='';

 r.data.forEach(i=>{
  let div=document.createElement('div');
  div.className="item";

  div.innerHTML=`
    <span>${escapeHtml(i.name)}</span>
    <div class="controls" id="ctrl-${i.id}">
      <i class="fa fa-pen" onclick="editItem(${i.id},'${encodeURIComponent(i.name)}')"></i>
      <i class="fa fa-trash" onclick="showConfirm(${i.id})"></i>
    </div>
  `;

  list.appendChild(div);
 });
}

// CONFIRM
function showConfirm(id){
 let ctrl=document.getElementById(`ctrl-${id}`);

 ctrl.innerHTML=`
   <div class="confirm-box">
     Delete?
     <button onclick="deleteItem(${id})">✔</button>
     <button onclick="load()">✖</button>
   </div>
 `;
}

// DELETE
async function deleteItem(id){
 let res=await fetch(`/api/items/${id}`,{method:'DELETE'});
 if(!res.ok) return showError("Delete failed");

 showSuccess("Deleted");
 load();
}

// SAVE
async function saveItem(){
 hideError();
 let name=document.getElementById('name').value;

 if(!name) return showError("Enter value");

 if(!editId){
  let res=await fetch('/api/items',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showSuccess("Added");

 } else {
  let res=await fetch(`/api/items/${editId}`,{
   method:'PUT',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showSuccess("Updated");
  editId=null;
 }

 document.getElementById('name').value='';
 load();
}

// EDIT
function editItem(id,name){
 document.getElementById('name').value=decodeURIComponent(name);
 editId=id;
}

// SEARCH
function searchItems(){
 searchQuery=document.getElementById('search').value;
 load();
}

// SAFE
function escapeHtml(t){
 return t.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>

</body>
</html>
