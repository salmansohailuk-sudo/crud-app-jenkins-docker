<script>
let editId=null;
let searchQuery='';
let lastData=[];   // ✅ store previous valid data
let lastPageInfo='';

// SUCCESS
function showSuccess(msg){
 let b=document.getElementById("successBox");
 b.innerText=msg;
 b.style.display="block";
 setTimeout(()=>b.style.display="none",2000);
}

// ERROR
function showError(msg){
 document.getElementById("errorText").innerText=msg;
 document.getElementById("errorBox").style.display="flex";
}
function hideError(){
 document.getElementById("errorBox").style.display="none";
}

// LOAD
async function load(){
 let res=await fetch(`/api/items?search=${searchQuery}`);
 let r=await res.json();

 let list=document.getElementById('list');

 // ❗ NO RESULTS CASE
 if(r.data.length === 0 && searchQuery){
   showNoDataMessage();
   return;
 }

 // ✅ SAVE LAST VALID DATA
 lastData = r.data;

 renderList(r.data);
}

// RENDER LIST
function renderList(data){
 let list=document.getElementById('list');
 list.innerHTML='';

 data.forEach(i=>{
  let div=document.createElement('div');
  div.className="item";

  div.innerHTML=`
    <span>${escapeHtml(i.name)}</span>
    <div class="controls" id="ctrl-${i.id}">
      <i class="fa fa-pen" onclick="editItem(${i.id},'${encodeURIComponent(i.name)}')"></i>
      <i class="fa fa-trash" onclick="showConfirm(${i.id})"></i>
    </div>
  `;

  list.appendChild(div);
 });
}

// ❗ SHOW MESSAGE BUT KEEP OLD DATA
function showNoDataMessage(){
 let list=document.getElementById('list');

 list.innerHTML = `
   <div style="text-align:center;padding:20px;color:#64748b;">
     ❌ No records found
   </div>
 ` + list.innerHTML;

 // restore old list below message
 renderList(lastData);
}

// CONFIRM
function showConfirm(id){
 let ctrl=document.getElementById(`ctrl-${id}`);

 ctrl.innerHTML=`
   <div class="confirm-box">
     Delete?
     <button onclick="deleteItem(${id})">✔</button>
     <button onclick="load()">✖</button>
   </div>
 `;
}

// DELETE
async function deleteItem(id){
 let res=await fetch(`/api/items/${id}`,{method:'DELETE'});
 if(!res.ok) return showError("Delete failed");

 showSuccess("Deleted");
 load();
}

// SAVE
async function saveItem(){
 hideError();
 let name=document.getElementById('name').value;

 if(!name) return showError("Enter value");

 if(!editId){
  let res=await fetch('/api/items',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showSuccess("Added");

 } else {
  let res=await fetch(`/api/items/${editId}`,{
   method:'PUT',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showSuccess("Updated");
  editId=null;
 }

 document.getElementById('name').value='';
 load();
}

// EDIT
function editItem(id,name){
 document.getElementById('name').value=decodeURIComponent(name);
 editId=id;
}

// SEARCH
function searchItems(){
 searchQuery=document.getElementById('search').value;
 load();
}

// SAFE
function escapeHtml(t){
 return t.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// INIT
load();
</script>
