<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRUD Dashboard</title>

<style>
body {font-family:system-ui;background:#f8fafc;color:#0f172a;margin:0;}
.container {max-width:700px;margin:auto;padding:20px;}

.header {display:flex;justify-content:space-between;align-items:center;}

.search-box {
  display:flex;align-items:center;background:#fff;padding:8px 12px;
  border-radius:10px;border:1px solid #e2e8f0;
}
.search-box input {border:none;outline:none;margin-left:6px;}

input,button {
  padding:10px;margin:6px 5px;border-radius:10px;border:1px solid #e2e8f0;
}
button {background:#2563eb;color:#fff;border:none;cursor:pointer;}

.error-box {
  background:#fee2e2;color:#991b1b;padding:10px;border-radius:10px;
  margin:10px 5px;display:none;justify-content:space-between;
}

.item {
  background:#fff;padding:14px;margin:10px 0;border-radius:12px;
  border:1px solid #e2e8f0;display:flex;justify-content:space-between;
}

.item.updated {
  border:2px solid #22c55e;
  background:#f0fdf4;
}

.controls {display:flex;gap:6px;}

.pagination {text-align:center;margin-top:10px;}

.toast {
  position:fixed;bottom:20px;right:20px;background:#22c55e;
  color:#fff;padding:10px 15px;border-radius:8px;display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>CRUD Dashboard</h2>
<div class="search-box">🔍<input id="search" placeholder="Search..." onkeyup="searchItems()"></div>
</div>

<input id="name" placeholder="Enter item">
<button onclick="saveItem()">Save</button>

<div id="errorBox" class="error-box">
  <span id="errorText"></span>
  <button onclick="hideError()">OK</button>
</div>

<div id="list"></div>

<div class="pagination">
<button onclick="prev()">Prev</button>
<span id="pageInfo"></span>
<button onclick="next()">Next</button>
</div>

</div>

<div id="toast" class="toast"></div>

<script>
let page=1,totalPages=1,editId=null,searchQuery='';

// TOAST
function showToast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",1500);
}

// ERROR
function showError(msg){
 document.getElementById("errorText").innerText=msg;
 document.getElementById("errorBox").style.display="flex";
}
function hideError(){
 document.getElementById("errorBox").style.display="none";
}

// LOAD
async function load(){
 let res=await fetch(`/api/items?page=${page}&limit=5&search=${searchQuery}`);
 let r=await res.json();

 totalPages=r.pages;
 document.getElementById('pageInfo').innerText=`Page ${page}/${totalPages}`;

 let list=document.getElementById('list');
 list.innerHTML='';

 r.data.forEach(i=>{
  let div=document.createElement('div');
  div.className="item";
  div.dataset.id=i.id;

  div.innerHTML=`${escapeHtml(i.name)}
   <div class="controls">
   <button onclick="editItem(${i.id},'${encodeURIComponent(i.name)}')">Edit</button>
   <button onclick="deleteItem(${i.id},this)">Delete</button>
   </div>`;

  list.appendChild(div);
 });
}

// SEARCH
function searchItems(){
 searchQuery=document.getElementById('search').value;
 page=1;
 load();
}

// SAVE
async function saveItem(){
 hideError();

 let name=document.getElementById('name').value;
 if(!name) return showError("Please enter value");

 if(!editId){
  let res=await fetch('/api/items',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showToast("Added");
  load();

 } else {
  let res=await fetch(`/api/items/${editId}`,{
   method:'PUT',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showToast("Updated");

  // 🔄 FULL REFRESH AFTER UPDATE
  setTimeout(()=>location.reload(), 800);

  editId=null;
 }

 document.getElementById('name').value='';
}

// EDIT
function editItem(id,name){
 document.getElementById('name').value=decodeURIComponent(name);
 editId=id;
}

// DELETE
async function deleteItem(id,btn){
 let row=btn.closest('.item');
 row.style.opacity="0.4";

 let res=await fetch(`/api/items/${id}`,{method:'DELETE'});

 if(!res.ok){
   row.style.opacity="1";
   return showError("Delete failed");
 }

 showToast("Deleted");

 // 🔄 FULL REFRESH AFTER DELETE
 setTimeout(()=>location.reload(), 800);
}

// PAGINATION
function next(){ if(page<totalPages){page++;load();}}
function prev(){ if(page>1){page--;load();}}

// SAFE
function escapeHtml(t){
 return t.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
