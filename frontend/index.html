<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CRUD Dashboard</title>

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --primary:#2563eb;
}

.dark {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
}

/* BODY */
body {
  font-family:system-ui;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  color:var(--text);
  margin:0;
  transition:0.3s;
}

.dark body {
  background:#0f172a;
}

.container {
  max-width:720px;
  margin:40px auto;
  padding:25px;
  background:var(--card);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.toggle {
  cursor:pointer;
  font-size:18px;
}

/* SEARCH */
.search-box {
  display:flex;
  align-items:center;
  background:#f1f5f9;
  padding:8px 12px;
  border-radius:10px;
}

.search-box input {
  border:none;
  background:transparent;
  outline:none;
  margin-left:5px;
}

/* INPUT */
input,button {
  padding:10px;
  margin:6px 5px;
  border-radius:10px;
  border:1px solid #e2e8f0;
}

button {
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { opacity:0.9; }

/* SUCCESS */
.success-box {
  background:#dcfce7;
  color:#166534;
  padding:10px;
  border-radius:10px;
  margin:10px 5px;
  display:none;
}

/* ERROR */
.error-box {
  background:#fee2e2;
  color:#991b1b;
  padding:10px;
  border-radius:10px;
  margin:10px 5px;
  display:none;
  justify-content:space-between;
}

/* ITEM */
.item {
  background:#f8fafc;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #e2e8f0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.item:hover {
  transform:scale(1.01);
}

.item.updated {
  border:2px solid #22c55e;
  background:#f0fdf4;
}

.controls i {
  cursor:pointer;
  margin-left:10px;
  font-size:16px;
}

.controls i:hover {
  transform:scale(1.2);
}

/* PAGINATION */
.pagination {
  text-align:center;
  margin-top:15px;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  color:#fff;
  padding:10px;
  border-radius:8px;
  display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>✨ CRUD Dashboard</h2>
<div>
<span class="toggle" onclick="toggleTheme()">🌓</span>
</div>
</div>

<div class="search-box">
<i class="fa fa-search"></i>
<input id="search" placeholder="Search..." onkeyup="searchItems()">
</div>

<input id="name" placeholder="Enter item">
<button onclick="saveItem()">Save</button>

<div id="successBox" class="success-box"></div>

<div id="errorBox" class="error-box">
<span id="errorText"></span>
<button onclick="hideError()">OK</button>
</div>

<div id="list"></div>

<div class="pagination">
<button onclick="prev()">Prev</button>
<span id="pageInfo"></span>
<button onclick="next()">Next</button>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<p>Delete this item?</p>
<button onclick="confirmDelete()">Confirm</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
let page=1,totalPages=1,editId=null,searchQuery='',deleteId=null;

// THEME
function toggleTheme(){
 document.body.classList.toggle('dark');
}

// TOAST
function showToast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

// SUCCESS
function showSuccess(msg){
 let b=document.getElementById("successBox");
 b.innerText=msg;
 b.style.display="block";
 setTimeout(()=>b.style.display="none",2000);
}

// ERROR
function showError(msg){
 document.getElementById("errorText").innerText=msg;
 document.getElementById("errorBox").style.display="flex";
}
function hideError(){
 document.getElementById("errorBox").style.display="none";
}

// LOAD
async function load(){
 let res=await fetch(`/api/items?page=${page}&limit=5&search=${searchQuery}`);
 let r=await res.json();

 totalPages=r.pages;
 document.getElementById('pageInfo').innerText=`Page ${page}/${totalPages}`;

 let list=document.getElementById('list');
 list.innerHTML='';

 r.data.forEach(i=>{
  let div=document.createElement('div');
  div.className="item";
  div.dataset.id=i.id;

  div.innerHTML=`${escapeHtml(i.name)}
   <div class="controls">
   <i class="fa fa-pen" onclick="editItem(${i.id},'${encodeURIComponent(i.name)}')"></i>
   <i class="fa fa-trash" onclick="openModal(${i.id})"></i>
   </div>`;

  list.appendChild(div);
 });
}

// SAVE
async function saveItem(){
 hideError();

 let name=document.getElementById('name').value;
 if(!name) return showError("Enter value");

 if(!editId){
  let res=await fetch('/api/items',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showToast("Added");

 } else {
  let res=await fetch(`/api/items/${editId}`,{
   method:'PUT',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showSuccess("Updated");

  setTimeout(()=>location.reload(),800);
  editId=null;
 }

 document.getElementById('name').value='';
 load();
}

// EDIT
function editItem(id,name){
 document.getElementById('name').value=decodeURIComponent(name);
 editId=id;
}

// DELETE
function openModal(id){
 deleteId=id;
 document.getElementById('modal').style.display="flex";
}
function closeModal(){
 document.getElementById('modal').style.display="none";
}
async function confirmDelete(){
 let res=await fetch(`/api/items/${deleteId}`,{method:'DELETE'});
 closeModal();

 if(!res.ok) return showError("Delete failed");

 showToast("Deleted");
 setTimeout(()=>location.reload(),800);
}

// SEARCH
function searchItems(){
 searchQuery=document.getElementById('search').value;
 page=1;
 load();
}

// PAGINATION
function next(){ if(page<totalPages){page++;load();}}
function prev(){ if(page>1){page--;load();}}

// SAFE
function escapeHtml(t){
 return t.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
