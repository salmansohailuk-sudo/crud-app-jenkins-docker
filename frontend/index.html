<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CRUD Dashboard</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: white;
}

.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: black;
}

body {
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 15px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* SEARCH */
.search-box {
  display: flex;
  align-items: center;
  background: var(--card);
  padding: 5px 10px;
  border-radius: 8px;
}

.search-box input {
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
}

/* ERROR BOX */
.error {
  background: #ef4444;
  padding: 10px;
  border-radius: 8px;
  margin: 10px 0;
  display: none;
}

/* INPUT */
input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.item {
  background: var(--card);
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.controls {
  display: flex;
  gap: 5px;
}

.pagination {
  text-align: center;
  margin-top: 10px;
}

/* MOBILE */
@media (max-width: 600px) {
  .header {
    flex-direction: column;
    gap: 10px;
  }

  .item {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>
      CRUD Dashboard
      <span onclick="toggleMode()" style="cursor:pointer;">🌓</span>
    </h2>

    <div class="search-box">
      🔍
      <input id="search" placeholder="Search..." onkeyup="searchItems()">
    </div>
  </div>

  <!-- ERROR MESSAGE -->
  <div id="errorBox" class="error"></div>

  <!-- INPUT -->
  <input id="name" placeholder="Enter item">
  <button onclick="saveItem()">Save</button>

  <!-- LIST -->
  <div id="list"></div>

  <!-- PAGINATION -->
  <div class="pagination">
    <button onclick="prev()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="next()">Next</button>
  </div>

</div>

<script>
let page = 1;
let totalPages = 1;
let editId = null;
let searchQuery = '';

// SHOW ERROR
function showError(message) {
  const box = document.getElementById('errorBox');
  box.innerText = message;
  box.style.display = 'block';

  setTimeout(() => {
    box.style.display = 'none';
  }, 3000);
}

// LOAD DATA
async function load() {
  let res = await fetch(`/api/items?page=${page}&limit=5&search=${searchQuery}`);
  let result = await res.json();

  totalPages = result.pages;

  document.getElementById('pageInfo').innerText =
    `Page ${page} / ${totalPages}`;

  let list = document.getElementById('list');
  list.innerHTML = '';

  result.data.forEach(i => {
    list.innerHTML += `
      <div class="item">
        ${escapeHtml(i.name)}
        <div class="controls">
          <button onclick="editItem(${i.id}, '${encodeURIComponent(i.name)}')">Edit</button>
          <button onclick="deleteItem(${i.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

// SEARCH
function searchItems() {
  searchQuery = document.getElementById('search').value;
  page = 1;
  load();
}

// SAVE (HANDLE ERRORS HERE)
async function saveItem() {
  let name = document.getElementById('name').value;

  if (!name) {
    showError("Please enter a value");
    return;
  }

  let response;

  if (editId) {
    response = await fetch(`/api/items/${editId}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})
    });
    editId = null;
  } else {
    response = await fetch('/api/items', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})
    });
  }

  let result = await response.json();

  if (!response.ok) {
    showError(result.error || "Something went wrong");
    return;
  }

  document.getElementById('name').value = '';
  load();
}

// EDIT
function editItem(id, name) {
  document.getElementById('name').value = decodeURIComponent(name);
  editId = id;
}

// DELETE
async function deleteItem(id) {
  let response = await fetch(`/api/items/${id}`, {method:'DELETE'});

  if (!response.ok) {
    let result = await response.json();
    showError(result.error || "Delete failed");
    return;
  }

  load();
}

// PAGINATION
function next() {
  if (page < totalPages) {
    page++;
    load();
  }
}

function prev() {
  if (page > 1) {
    page--;
    load();
  }
}

// THEME
function toggleMode() {
  document.body.classList.toggle('light');
}

// SAFE HTML
function escapeHtml(text) {
  return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// INIT
load();
</script>

</body>
</html>
