<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CRUD Dashboard</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --border:#e2e8f0;
}
.dark {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --border:#334155;
}

body {
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  margin:0;
}

.container {
  max-width:720px;
  margin:40px auto;
  padding:25px;
  background:var(--card);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* toggle */
.switch {width:50px;height:26px;position:relative;}
.switch input {display:none;}
.slider {
  position:absolute;background:#ccc;border-radius:50px;
  top:0;bottom:0;left:0;right:0;cursor:pointer;
}
.slider:before {
  content:"";position:absolute;height:20px;width:20px;
  left:3px;top:3px;background:#fff;border-radius:50%;
  transition:0.3s;
}
input:checked + .slider {background:#2563eb;}
input:checked + .slider:before {transform:translateX(24px);}

/* search */
.search-box {
  display:flex;align-items:center;
  background:var(--bg);
  border:1px solid var(--border);
  padding:8px;border-radius:10px;
}
.search-box input {
  border:none;background:transparent;
  margin-left:6px;outline:none;color:var(--text);
}

/* input */
input,button {
  padding:10px;margin:6px 5px;
  border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);
}
button {
  background:#2563eb;color:white;border:none;
}

/* items */
.item {
  background:var(--bg);
  padding:14px;margin:10px 0;
  border-radius:12px;border:1px solid var(--border);
  display:flex;justify-content:space-between;
}

.controls i {margin-left:10px;cursor:pointer;}

.confirm-box {
  background:#fff7ed;padding:6px;border-radius:8px;
  display:flex;gap:6px;
}

/* messages */
.success-box {background:#dcfce7;padding:10px;border-radius:10px;display:none;}
.error-box {background:#fee2e2;padding:10px;border-radius:10px;display:none;justify-content:space-between;}

.no-data {
  text-align:center;
  padding:10px;
  color:#64748b;
}

/* pagination */
.pagination {
  text-align:center;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>✨ CRUD Dashboard</h2>
<label class="switch">
<input type="checkbox" id="themeToggle" onchange="toggleTheme()">
<span class="slider"></span>
</label>
</div>

<div class="search-box">
<i class="fa fa-search"></i>
<input id="search" placeholder="Search..." onkeyup="searchItems()">
</div>

<input id="name" placeholder="Enter item">
<button onclick="saveItem()">Save</button>

<div id="successBox" class="success-box"></div>

<div id="errorBox" class="error-box">
<span id="errorText"></span>
<button onclick="hideError()">OK</button>
</div>

<div id="list"></div>

<div class="pagination">
<button onclick="prev()">Prev</button>
<span id="pageInfo"></span>
<button onclick="next()">Next</button>
</div>

</div>

<script>
let page=1;
let totalPages=1;
let searchQuery='';
let editId=null;

// THEME
window.onload=()=>{
 let t=localStorage.getItem("theme");
 if(t==="dark"){
  document.body.classList.add("dark");
  document.getElementById("themeToggle").checked=true;
 }
 load();
};

function toggleTheme(){
 document.body.classList.toggle("dark");
 localStorage.setItem("theme",
   document.body.classList.contains("dark")?"dark":"light");
}

// LOAD
async function load(){
 let res=await fetch(`/api/items?page=${page}&limit=5&search=${searchQuery}`);
 let r=await res.json();

 totalPages=r.pages;

 // ✅ FIX: auto-correct page if empty
 if(r.data.length === 0 && page > 1){
   page--;        // go back one page
   return load(); // reload again
 }

 document.getElementById("pageInfo").innerText=`Page ${page}/${totalPages}`;

 if(r.data.length===0){
   document.getElementById("list").innerHTML =
     `<div class="no-data">No records found</div>`;
   return;
 }

 render(r.data);
}

// RENDER
function render(data){
 let list=document.getElementById("list");
 list.innerHTML='';

 data.forEach(i=>{
  list.innerHTML+=`
   <div class="item">
    ${escapeHtml(i.name)}
    <div class="controls" id="ctrl-${i.id}">
      <i class="fa fa-pen" onclick="editItem(${i.id},'${encodeURIComponent(i.name)}')"></i>
      <i class="fa fa-trash" onclick="confirmUI(${i.id})"></i>
    </div>
   </div>
  `;
 });
}

// CONFIRM
function confirmUI(id){
 document.getElementById(`ctrl-${id}`).innerHTML=`
  <div class="confirm-box">
    Delete?
    <button onclick="deleteItem(${id})">✔</button>
    <button onclick="load()">✖</button>
  </div>
 `;
}

// DELETE
async function deleteItem(id){
 await fetch(`/api/items/${id}`,{method:'DELETE'});
 showSuccess("Deleted");
 load(); // reload triggers fix
}

// SAVE
async function saveItem(){
 hideError();
 let name=document.getElementById("name").value;

 if(!name) return showError("Enter value");

 if(!editId){
  let res=await fetch('/api/items',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showSuccess("Added");
 } else {
  let res=await fetch(`/api/items/${editId}`,{
   method:'PUT',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name})
  });

  let d=await res.json();
  if(!res.ok) return showError(d.error);

  showSuccess("Updated");
  editId=null;
 }

 document.getElementById("name").value='';
 load();
}

// SEARCH
function searchItems(){
 searchQuery=document.getElementById("search").value;
 page=1;
 load();
}

// PAGINATION
function next(){
 if(page<totalPages){page++;load();}
}
function prev(){
 if(page>1){page--;load();}
}

// MESSAGES
function showSuccess(msg){
 let b=document.getElementById("successBox");
 b.innerText=msg;b.style.display="block";
 setTimeout(()=>b.style.display="none",2000);
}
function showError(msg){
 document.getElementById("errorText").innerText=msg;
 document.getElementById("errorBox").style.display="flex";
}
function hideError(){
 document.getElementById("errorBox").style.display="none";
}

// SAFE
function escapeHtml(t){
 return t.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>

</body>
</html>
